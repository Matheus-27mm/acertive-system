<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acertive - Configuração Inicial (Admin)</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    :root{--black:#0a0a0a;--gold:#FFD700;--dark-gold:#FFA500;--gray:#1a1a1a;--white:#FFFFFF}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,var(--black) 0%,var(--gray) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--white)}
    .cadastro-container{background:rgba(0,0,0,.7);border:1px solid var(--gold);border-radius:16px;padding:40px 32px;width:100%;max-width:440px;box-shadow:0 10px 30px rgba(255,215,0,.2);backdrop-filter:blur(10px);animation:slideUp .8s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:18px}
    .logo h1{font-size:26px;color:var(--gold);letter-spacing:1px}
    .logo p{font-size:13px;color:#ccc;margin-top:6px;line-height:1.4}
    .badge{display:inline-flex;gap:8px;align-items:center;padding:8px 10px;border:1px solid rgba(255,215,0,.35);border-radius:12px;background:rgba(255,215,0,.08);color:#ffe58a;font-weight:700;font-size:12px;margin:12px auto 0}
    .form-group{margin-bottom:18px;position:relative}
    .form-group label{position:absolute;top:12px;left:40px;font-size:13px;color:var(--gold);font-weight:600;transition:all .3s ease;pointer-events:none}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;padding:12px 12px 12px 40px;border:1px solid var(--gold);border-radius:8px;background:rgba(255,255,255,.05);color:var(--white);font-size:15px;transition:all .3s ease}
    .input-wrapper input:focus{outline:none;border-color:var(--dark-gold);box-shadow:0 0 10px rgba(255,215,0,.5)}
    .input-wrapper input:focus+label,.input-wrapper input:not(:placeholder-shown)+label{top:-10px;left:12px;font-size:11px;color:var(--dark-gold)}
    .input-wrapper i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:16px}
    .row-pass{display:flex;gap:10px;align-items:center}
    .btn-eye{border:1px solid rgba(255,215,0,.35);background:rgba(255,215,0,.08);color:#ffe58a;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:800}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold) 0%,var(--dark-gold) 100%);color:var(--black);border:none;border-radius:8px;font-size:16px;font-weight:800;cursor:pointer;transition:all .3s ease}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,215,0,.4)}
    .extra-links{text-align:center;margin-top:16px;font-size:14px}
    .extra-links a{color:var(--gold);text-decoration:none}
    .footer-text{text-align:center;margin-top:26px;font-size:12px;color:#888}
    .hint{font-size:12px;color:#bdbdbd;margin-top:8px;line-height:1.4}
    @media(max-width:480px){.cadastro-container{margin:20px;padding:30px 20px}}
  </style>
</head>
<body>
  <div class="cadastro-container">
    <div class="logo">
      <h1>ACERTIVE</h1>
      <p>Configuração inicial do administrador (apenas 1 usuário).</p>
      <div class="badge"><i class="fa-solid fa-shield-halved"></i> Setup do Admin</div>
    </div>

    <form id="cadForm" autocomplete="on">
      <div class="form-group">
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="nome" placeholder=" " required />
          <label>Nome do admin</label>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder=" " required />
          <label>Email do admin</label>
        </div>
      </div>

      <div class="form-group">
        <div class="row-pass">
          <div class="input-wrapper" style="flex:1">
            <i class="fas fa-lock"></i>
            <input type="password" id="senha" placeholder=" " minlength="8" required />
            <label>Senha (mínimo 8)</label>
          </div>
          <button class="btn-eye" id="toggleSenha" type="button">Ver</button>
        </div>
        <div class="hint">
          Esta tela deve ser usada somente na primeira instalação. Depois, você fará login normalmente.
        </div>
      </div>

      <button type="submit" class="btn-primary">
        <i class="fas fa-user-shield"></i> Criar Admin
      </button>
    </form>

    <div class="extra-links">
      <p>Já existe um admin? <a href="/login">Ir para login</a></p>
    </div>

    <div class="footer-text">© 2025 Acertive - Todos os direitos reservados</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      if (typeof Toastify === 'undefined') return alert(msg);
      Toastify({
        text: msg,
        duration: 3500,
        close: true,
        gravity: 'top',
        position: 'right',
        backgroundColor: type === 'success' ? '#22c55e' : (type === 'warning' ? '#f59e0b' : '#ef4444')
      }).showToast();
    }

    const senhaInput = document.getElementById('senha');
    document.getElementById('toggleSenha').addEventListener('click', () => {
      const isPass = senhaInput.type === 'password';
      senhaInput.type = isPass ? 'text' : 'password';
      document.getElementById('toggleSenha').innerText = isPass ? 'Ocultar' : 'Ver';
    });

    document.getElementById('cadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!nome || !email || !senha) {
        showToast('Preencha nome, email e senha.', 'error');
        return;
      }
      if (senha.length < 8) {
        showToast('A senha precisa ter no mínimo 8 caracteres.', 'error');
        return;
      }

      try {
        const resp = await fetch('/api/auth/bootstrap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ nome, email, senha })
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok || !data.success) {
          showToast(data.message || 'Não foi possível criar o admin.', 'error');
          return;
        }

        showToast('Admin criado. Faça login.', 'success');
        setTimeout(() => window.location.href = '/login', 700);

      } catch (err) {
        showToast('Erro de rede ao criar admin.', 'error');
      }
    });
  </script>
</body>
</html>
