<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acertive - Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --gold: #FFD700;
      --dark-gold: #FFA500;
      --gray: #1a1a1a;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, var(--black) 0%, var(--gray) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cadastro-container {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .cadastro-container:hover {
      transform: translateY(-5px);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .logo p {
      font-size: 14px;
      color: #ccc;
      margin-top: 4px;
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-group {
      flex: 1;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
    }

    .input-wrapper input,
    .input-wrapper select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--white);
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus,
    .input-wrapper select:focus {
      outline: none;
      border-color: var(--dark-gold);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
      color: var(--black);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }

    .extra-links {
      text-align: center;
      margin-top: 20px;
    }

    .extra-links a {
      color: var(--gold);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s ease;
    }

    .extra-links a:hover {
      color: var(--dark-gold);
    }

    .footer-text {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #888;
    }

    @media (max-width: 480px) {
      .form-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="cadastro-container">
    <div class="logo">
      <h1>🔶 ACERTIVE</h1>
      <p>Cadastro - Sistema de Cobranças</p>
    </div>

    <form id="cadastroForm">
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <div class="input-wrapper">
            <input type="text" id="nome" placeholder="Seu nome" required />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="seu@email.com" required />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrapper">
          <input type="password" id="senha" placeholder="Crie uma senha forte" required />
        </div>
      </div>

      <div class="form-group">
        <label>Plano</label>
        <div class="input-wrapper">
          <select id="plano" required>
            <option value="">Escolha um plano</option>
            <option value="basico">Básico - R$ 97/mês</option>
            <option value="profissional">Profissional - R$ 197/mês</option>
            <option value="empresarial">Empresarial - R$ 397/mês</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary">Criar Conta</button>
    </form>

    <div class="extra-links">
      <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
    </div>

    <div class="footer-text">
      © 2025 Acertive - Todos os direitos reservados
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script>
    document.getElementById('cadastroForm').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Cadastro realizado com sucesso!');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
