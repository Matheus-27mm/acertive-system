<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acertive - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --gold: #FFD700;
      --dark-gold: #FFA500;
      --gray: #1a1a1a;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, var(--black) 0%, var(--gray) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-container {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .logo p {
      font-size: 14px;
      color: #ccc;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 16px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--white);
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--dark-gold);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
      color: var(--black);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }

    .extra-links {
      text-align: center;
      margin-top: 20px;
    }

    .extra-links a {
      color: var(--gold);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s ease;
    }

    .extra-links a:hover {
      color: var(--dark-gold);
    }

    .footer-text {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #888;
    }

    /* Responsividade */
    @media (max-width: 480px) {
      .login-container {
        margin: 20px;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🔶 ACERTIVE</h1>
      <p>Sistema de Cobranças Profissional</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="senha" placeholder="••••••••" required />
        </div>
      </div>

      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <div class="extra-links">
      <p><a href="cadastro.html">Não tem uma conta? Cadastre-se</a></p>
      <p><a href="#">Esqueceu sua senha?</a></p>
    </div>

    <div class="footer-text">
      © 2025 Acertive - Todos os direitos reservados
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Login simulado com sucesso!');
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
