<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acertive • Login</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    :root{
      /* ===== Paleta premium (mesmo padrão do clientes-ativos) ===== */
      --bg1:#070707;
      --bg2:#0f0f12;

      --card: rgba(17,17,20,.72);
      --card2: rgba(10,10,12,.92);

      --text:#EAEAEA;
      --text2:#CFCFCF;
      --muted:#A7A7A7;

      --gold:#F6C84C;
      --gold2:#FFD56A;
      --gold-weak: rgba(246,200,76,.35);

      --line: rgba(246,200,76,.14);

      --shadow: 0 18px 60px rgba(0,0,0,.62);
      --shadowSoft: 0 10px 28px rgba(0,0,0,.50);

      --radius:18px;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Montserrat',sans-serif;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 18% 18%, rgba(246,200,76,.09), transparent 56%),
        radial-gradient(760px 520px at 86% 22%, rgba(255,213,106,.06), transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 62%);
    }

    .wrap{
      width:100%;
      max-width:520px;
      position:relative;
      z-index:1;
    }

    /* =======================
       CARD
    ======================= */
    .card{
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid rgba(246,200,76,.14);
      box-shadow: var(--shadow);
      padding: 30px 28px;
      position: relative;
      overflow: hidden;
      animation: fadeUp .5s ease both;
      backdrop-filter: blur(10px);
    }

    /* Shine bem discreto (premium) */
    .card::after{
      content:"";
      position:absolute;
      inset:-2px;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(246,200,76,.12) 25%,
        transparent 55%
      );
      transform: translateX(-45%);
      opacity: 0;
      pointer-events:none;
      transition: opacity .4s ease;
    }

    .card:hover::after,
    .card:focus-within::after{
      opacity: .55;
      animation: shine 6.5s ease-in-out infinite;
    }

    @keyframes shine{
      0%{transform:translateX(-45%)}
      50%{transform:translateX(35%)}
      100%{transform:translateX(-45%)}
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(14px)}
      to{opacity:1; transform:translateY(0)}
    }

    .cardHeader{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      position:relative;
      z-index:2;
    }

    .cardHeader h2{
      font-size:20px;
      color: var(--gold);
      letter-spacing:.2px;
    }

    .cardHeader p{
      margin-top:6px;
      font-size:13px;
      color: var(--muted);
      opacity:.95;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(246,200,76,.18);
      background:rgba(0,0,0,.22);
      color: var(--text2);
      font-weight:700;
      font-size:12px;
      white-space:nowrap;
    }
    .pill i{color: var(--gold);}

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(246,200,76,.18),transparent);
      margin:14px 0 12px;
      position:relative;
      z-index:2;
    }

    /* =======================
       FORM
    ======================= */
    .form{
      display:grid;
      gap:14px;
      position:relative;
      z-index:2;
    }

    .field{
      display:grid;
      gap:8px;
      transition: transform .2s ease;
    }

    .field:focus-within{
      transform: translateY(-1px);
    }

    .field label{
      font-size:12px;
      font-weight:600;
      color: var(--text2);
      opacity:.95;
    }

    .control{
      position:relative;
    }

    .control input{
      width:100%;
      padding:12px 44px;
      border-radius:12px;
      border:1px solid rgba(246,200,76,.14);
      background:rgba(0,0,0,.22);
      color: var(--text);
      transition:.2s;
    }
    .control input::placeholder{color: rgba(234,234,234,.40);}

    .control input:focus{
      outline:none;
      border-color:rgba(246,200,76,.35);
      box-shadow:0 0 0 4px rgba(246,200,76,.10);
      background:rgba(0,0,0,.30);
    }

    .iconLeft,.iconRight{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:36px;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      color: var(--gold);
    }

    .iconLeft{left:6px}
    .iconRight{right:6px}

    .btnIcon{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(246,200,76,.18);
      border-radius:10px;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .btnIcon:hover{
      transform: translateY(-1px);
      background: rgba(0,0,0,.32);
      border-color: rgba(246,200,76,.28);
    }

    /* =======================
       BOTÃO
    ======================= */
    .btn{
      margin-top:10px;
      width:100%;
      padding:13px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-weight:800;
      color:#121212;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      box-shadow:0 10px 24px rgba(246,200,76,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
      filter: saturate(1.02);
    }

    .btn.loading{
      pointer-events:none;
      opacity:.88;
    }

    .btn.loading i{
      animation: spin .9s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .foot{
      margin-top:14px;
      font-size:12px;
      text-align:center;
      color: var(--muted);
      line-height: 1.5;
    }

    .link{
      color: var(--gold2);
      font-weight:800;
      text-decoration:none;
    }
    .link:hover{ text-decoration: underline; }
  </style>
</head>

<body>
  <div class="wrap">
    <main class="card">
      <div class="cardHeader">
        <div>
          <h2>Entrar no ACERTIVE</h2>
          <p>Use suas credenciais para acessar o painel administrativo.</p>
        </div>
        <div class="pill"><i class="fa-solid fa-lock"></i> Acesso Restrito</div>
      </div>

      <div class="divider"></div>

      <form id="loginForm" class="form">
        <div class="field">
          <label>E-mail</label>
          <div class="control">
            <span class="iconLeft"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" id="email" required>
          </div>
        </div>

        <div class="field">
          <label>Senha</label>
          <div class="control">
            <span class="iconLeft"><i class="fa-solid fa-key"></i></span>
            <input type="password" id="senha" required>
            <button type="button" class="iconRight btnIcon" id="toggleSenha">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn" type="submit">
          <i class="fa-solid fa-right-to-bracket"></i>
          Entrar
        </button>

        <div class="foot">
          © 2025 ACERTIVE
        </div>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.js"></script>

  <!-- UX: loading + toggle senha -->
  <script>
    const form = document.getElementById("loginForm");
    const btn = form.querySelector(".btn");
    const toggleSenha = document.getElementById("toggleSenha");
    const senha = document.getElementById("senha");

    form.addEventListener("submit", () => {
      btn.classList.add("loading");
      btn.innerHTML = '<i class="fa-solid fa-circle-notch"></i> Entrando...';
    });

    toggleSenha.addEventListener("click", () => {
      senha.type = senha.type === "password" ? "text" : "password";
      toggleSenha.innerHTML = senha.type === "text"
        ? '<i class="fa-solid fa-eye-slash"></i>'
        : '<i class="fa-solid fa-eye"></i>';
    });
  </script>

  <!-- Mantido -->
  <script src="/js/login.js"></script>
</body>
</html>
