<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACERTIVE • Clientes</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <!-- SheetJS (leitura Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg1:#070707;
      --bg2:#131313;
      --card:#0f0f10cc;
      --card2:#111114f2;
      --gold:#FFD700;
      --gold2:#FFA500;
      --white:#ffffff;
      --muted:#b9b9b9;
      --line:rgba(255,215,0,.18);
      --shadow: 0 18px 60px rgba(0,0,0,.62);
      --shadowSoft: 0 10px 28px rgba(0,0,0,.50);
      --radius:18px;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Montserrat',sans-serif;
      min-height:100vh;
      color:var(--white);
      background:
        radial-gradient(900px 500px at 20% 20%, rgba(255,215,0,.10), transparent 55%),
        radial-gradient(800px 500px at 85% 20%, rgba(255,165,0,.10), transparent 50%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding:24px;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.22;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 62%);
    }

    .topbar{
      width:100%;
      max-width: 1180px;
      margin: 0 auto 18px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid rgba(255,215,0,.18);
      box-shadow: var(--shadowSoft);
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(10px);
    }

    .topbar::after{
      content:"";
      position:absolute;
      inset:-2px;
      background: linear-gradient(120deg, transparent 0%, rgba(255,215,0,.08) 25%, transparent 55%);
      transform: translateX(-30%);
      animation: shine 6.5s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes shine{
      0%{transform:translateX(-45%)}
      50%{transform:translateX(35%)}
      100%{transform:translateX(-45%)}
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:.4px;
      color: var(--white);
      position:relative;
      z-index:1;
    }

    .mark{
      width:40px;height:40px;
      border-radius:14px;
      background: linear-gradient(135deg, rgba(255,215,0,.95), rgba(255,165,0,.95));
      box-shadow: 0 10px 20px rgba(255,215,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#111;
      font-weight:900;
      user-select:none;
    }

    .brand small{
      display:block;
      color: rgba(255,215,0,.92);
      font-weight:700;
      margin-top:2px;
      letter-spacing:.2px;
      font-size: 12px;
    }

    .navbtns{
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      justify-content:flex-end;
      position:relative;
      z-index:1;
      align-items:center;
    }

    .navbtn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,215,0,.20);
      background: rgba(255,215,0,.10);
      color: rgba(255,215,0,.95);
      font-weight:800;
      text-decoration:none;
      cursor:pointer;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
      user-select:none;
      white-space:nowrap;
    }
    .navbtn:hover{
      transform: translateY(-1px);
      background: rgba(255,215,0,.16);
      border-color: rgba(255,215,0,.30);
    }

    .wrap{
      width:100%;
      max-width: 1180px;
      margin: 0 auto;
      display:grid;
      gap:18px;
    }

    .card{
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid rgba(255,215,0,.20);
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(10px);
      position:relative;
      overflow:hidden;
      animation: fadeUp .55s ease both;
    }

    @keyframes fadeUp{
      from{opacity:0; transform: translateY(14px)}
      to{opacity:1; transform: translateY(0)}
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size: 22px;
      font-weight: 900;
    }

    .title i{
      color: rgba(255,215,0,.95);
    }

    .sub{
      color: rgba(255,255,255,.66);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.45;
    }

    .tools{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .fileInput{
      display:none;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,.22), transparent);
      margin: 14px 0;
    }

    .filters{
      display:flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:space-between;
    }

    .search{
      flex: 1;
      min-width: 260px;
      position:relative;
    }

    .search input{
      width:100%;
      padding: 12px 14px 12px 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,.18);
      background: rgba(255,255,255,.04);
      color: var(--white);
      font-size: 14px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .search input:focus{
      border-color: rgba(255,215,0,.60);
      box-shadow: 0 0 0 4px rgba(255,215,0,.14);
      background: rgba(255,255,255,.06);
    }

    .search i{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      left: 12px;
      color: rgba(255,215,0,.85);
      opacity: .9;
    }

    select{
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,.18);
      background: rgba(255,255,255,.04);
      color: var(--white);
      outline: none;
      cursor:pointer;
      min-width: 180px;
    }

    .tableWrap{
      overflow:auto;
      border-radius: 16px;
      border: 1px solid rgba(255,215,0,.14);
      background: rgba(0,0,0,.16);
      box-shadow: var(--shadowSoft);
    }

    table{
      width:100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td{
      padding: 14px 14px;
      text-align:left;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
    }

    th{
      font-size: 12px;
      letter-spacing:.5px;
      text-transform: uppercase;
      color: rgba(255,215,0,.95);
      background: rgba(0,0,0,.28);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td{
      background: rgba(255,215,0,.04);
    }

    .nameCell{
      font-weight: 900;
      color: rgba(255,215,0,.95);
      display:flex;
      flex-direction:column;
      gap: 3px;
    }
    .nameCell small{
      font-weight: 700;
      color: rgba(255,255,255,.58);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing:.3px;
      border: 1px solid rgba(255,215,0,.18);
      background: rgba(255,215,0,.10);
      color: rgba(255,215,0,.95);
      white-space:nowrap;
    }
    .badge.inativo{
      border-color: rgba(220,53,69,.35);
      background: rgba(220,53,69,.12);
      color: rgba(220,53,69,.95);
    }

    .actions{
      display:flex;
      gap:8px;
    }

    .iconBtn{
      width:36px;height:36px;
      border-radius: 10px;
      border: 1px solid rgba(255,215,0,.18);
      background: rgba(255,215,0,.10);
      color: rgba(255,215,0,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .iconBtn:hover{
      transform: translateY(-1px);
      background: rgba(255,215,0,.16);
      border-color: rgba(255,215,0,.30);
    }

    .iconBtn.danger{
      border-color: rgba(220,53,69,.35);
      background: rgba(220,53,69,.12);
      color: rgba(220,53,69,.95);
    }

    .footerInfo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
      color: rgba(255,255,255,.62);
      font-size: 12px;
    }

    .empty{
      text-align:center;
      padding: 36px 12px;
      color: rgba(255,255,255,.65);
      display:none;
    }
    .empty i{
      font-size: 44px;
      opacity:.55;
      margin-bottom: 10px;
      color: rgba(255,215,0,.85);
    }
    .empty h3{
      font-size: 18px;
      font-weight: 900;
      color: rgba(255,255,255,.9);
      margin-bottom: 6px;
    }

    @media (max-width: 920px){
      body{padding: 18px}
      table{min-width: 860px}
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <div class="mark">A</div>
      <div>
        ACERTIVE
        <small>Clientes</small>
      </div>
    </div>

    <div class="navbtns">
      <a class="navbtn" href="/dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <button class="navbtn" id="btnLogout" type="button"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
  </div>

  <div class="wrap">
    <section class="card">
      <div class="row">
        <div>
          <div class="title"><i class="fa-solid fa-users"></i> Gerenciamento de Clientes</div>
          <div class="sub">Importe do Excel, pesquise e mantenha seus clientes organizados no padrão ACERTIVE.</div>
        </div>

        <div class="tools">
          <button class="navbtn" id="btnVoltar" type="button"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
          <button class="navbtn" id="btnNovo" type="button"><i class="fa-solid fa-plus"></i> Novo Cliente</button>

          <input class="fileInput" id="fileExcel" type="file" accept=".xlsx,.xls" />
          <button class="navbtn" id="btnImportar" type="button"><i class="fa-solid fa-file-import"></i> Importar Excel</button>

          <button class="navbtn" id="btnExportar" type="button"><i class="fa-solid fa-download"></i> Exportar CSV</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="filters">
        <div class="search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" type="text" placeholder="Pesquisar por nome, email, telefone..." />
        </div>

        <select id="statusFilter">
          <option value="">Todos os Status</option>
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>

      <div class="divider"></div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Telefone</th>
              <th>CPF/CNPJ</th>
              <th>Status</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>

        <div class="empty" id="empty">
          <i class="fa-solid fa-user-slash"></i>
          <h3>Nenhum cliente encontrado</h3>
          <div>Importe uma planilha ou cadastre um novo cliente.</div>
        </div>
      </div>

      <div class="footerInfo">
        <div id="clientCount">0 clientes</div>
        <div id="statusBar"></div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.js"></script>
  <script src="/js/clientes-ativos.js"></script>
</body>
</html>
