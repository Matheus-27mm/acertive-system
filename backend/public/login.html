<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACERTIVE - Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e0bc6e;
            --gold-dim: #8b7434;
            --gold-glow: rgba(201, 168, 76, 0.15);
            --gold-glow-strong: rgba(201, 168, 76, 0.3);
            --bg-deep: #050709;
            --text: #e8e6e1;
            --text-dim: #9a9690;
            --text-muted: #5a5650;
            --danger: #e05c5c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* ── Video Background ── */
        .video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            filter: brightness(0.75) saturate(1.1);
        }

        /* Gradient overlays sobre o video */
        .video-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at center, transparent 20%, rgba(5,7,9,0.1) 100%),
                linear-gradient(180deg, rgba(5,7,9,0.15) 0%, rgba(5,7,9,0.05) 50%, rgba(5,7,9,0.3) 100%);
        }

        /* Vinheta nas bordas */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(5,7,9,0.2) 100%);
        }

        /* ── Centering wrapper ── */
        .scene {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ── Card central ── */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(5, 7, 9, 0.42);
            border: 1px solid rgba(201, 168, 76, 0.22);
            border-radius: 24px;
            padding: 48px 44px 40px;
            backdrop-filter: blur(36px) saturate(1.8);
            -webkit-backdrop-filter: blur(36px) saturate(1.8);
            box-shadow:
                0 40px 80px rgba(0,0,0,0.35),
                0 0 0 1px rgba(255,255,255,0.03),
                inset 0 1px 0 rgba(201,168,76,0.12);
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Logo ── */
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 40px;
            animation: fadeDown 1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-img-wrap {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .logo-img-wrap::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.12); }
        }

        .logo-img-wrap img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            position: relative;
            filter: drop-shadow(0 6px 20px rgba(201,168,76,0.5));
            mix-blend-mode: screen;
            background: transparent;
        }

        .logo-wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 8px;
            color: var(--text);
            text-transform: uppercase;
        }

        .logo-wordmark span { color: var(--gold); }

        .logo-divider {
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin-top: 14px;
            opacity: 0.6;
        }

        /* ── Form header ── */
        .form-header {
            margin-bottom: 32px;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .form-header p {
            font-size: 13px;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 0.2px;
        }

        /* ── Fields ── */
        .fields {
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .form-field:focus-within label { color: var(--gold); }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.ico {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--text-muted);
            transition: color 0.3s;
            pointer-events: none;
        }

        .form-field:focus-within .input-wrap i.ico { color: var(--gold); }

        .input-wrap input {
            width: 100%;
            padding: 15px 16px 15px 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.3px;
        }

        .input-wrap input:focus {
            outline: none;
            background: rgba(201,168,76,0.05);
            border-color: rgba(201,168,76,0.4);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08), 0 8px 24px rgba(0,0,0,0.2);
        }

        .input-wrap input::placeholder { color: var(--text-muted); }

        .input-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            padding: 4px;
            transition: color 0.3s;
        }

        .input-wrap .toggle-pw:hover { color: var(--gold); }

        /* ── Options ── */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .remember input { display: none; }

        .remember .chk {
            width: 17px;
            height: 17px;
            border: 1.5px solid rgba(201,168,76,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
        }

        .remember:hover .chk { border-color: var(--gold); }

        .remember input:checked + .chk {
            background: var(--gold);
            border-color: var(--gold);
        }

        .remember .chk i {
            font-size: 9px;
            color: var(--bg-deep);
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s;
        }

        .remember input:checked + .chk i { opacity: 1; transform: scale(1); }

        .remember span {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 300;
        }

        .forgot {
            font-size: 12px;
            color: var(--gold-dim);
            text-decoration: none;
            transition: color 0.25s;
        }

        .forgot:hover { color: var(--gold-light); }

        /* ── Alert ── */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            animation: alertIn 0.3s ease;
        }

        .alert.show { display: flex; }

        .alert-error {
            background: rgba(224,92,92,0.08);
            border: 1px solid rgba(224,92,92,0.2);
            color: #f08080;
        }

        .alert-success {
            background: rgba(62,207,142,0.08);
            border: 1px solid rgba(62,207,142,0.2);
            color: #5dbb8a;
        }

        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
            border: none;
            border-radius: 12px;
            color: #050709;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(201,168,76,0.3), 0 4px 12px rgba(0,0,0,0.3);
        }

        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        .btn-label { transition: opacity 0.25s; }

        .btn-spinner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            border: 2px solid rgba(5,7,9,0.1);
            border-top-color: #050709;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-submit.loading .btn-label { opacity: 0; }
        .btn-submit.loading .btn-spinner { display: block; }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* ── Footer ── */
        .card-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.8px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-card { padding: 40px 28px 32px; }
            .logo-wordmark { font-size: 26px; letter-spacing: 6px; }
            .form-options { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- Vídeo de fundo -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="predios.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Vinheta -->
    <div class="vignette"></div>

    <!-- Cena central -->
    <div class="scene">
        <div class="login-card">

            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-img-wrap">
                    <img src="acertivelogo.png" alt="ACERTIVE">
                </div>
                <div class="logo-wordmark">ACERT<span>IVE</span></div>
                <div class="logo-divider"></div>
            </div>

            <!-- Header do form -->
            <div class="form-header">
                <h2>Bem-vindo</h2>
                <p>Acesse sua conta para continuar</p>
            </div>

            <!-- Formulário -->
            <div class="fields">
                <div class="alert alert-error" id="alertError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="alertErrorText">Erro</span>
                </div>
                <div class="alert alert-success" id="alertSuccess">
                    <i class="fas fa-check-circle"></i>
                    <span>Autenticado com sucesso</span>
                </div>

                <form id="loginForm" autocomplete="on">
                    <div class="form-field">
                        <label>E-mail</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope ico"></i>
                            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="form-field">
                        <label>Senha</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock ico"></i>
                            <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" class="toggle-pw" onclick="togglePw()">
                                <i class="fas fa-eye" id="pwIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember">
                            <input type="checkbox" id="lembrar">
                            <span class="chk"><i class="fas fa-check"></i></span>
                            <span>Lembrar</span>
                        </label>
                        <a href="recuperar-senha.html" class="forgot">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-submit" id="btnLogin">
                        <span class="btn-label">Entrar</span>
                        <div class="btn-spinner"></div>
                    </button>
                </form>
            </div>

            <div class="card-footer">&copy; 2025 ACERTIVE</div>
        </div>
    </div>

    <script>
        var API = window.location.origin;

        function togglePw() {
            var inp = document.getElementById('senha');
            var ico = document.getElementById('pwIcon');
            if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fas fa-eye-slash'; }
            else { inp.type = 'password'; ico.className = 'fas fa-eye'; }
        }

        function showAlert(type, msg) {
            document.getElementById('alertError').classList.remove('show');
            document.getElementById('alertSuccess').classList.remove('show');
            if (type === 'error') {
                document.getElementById('alertErrorText').textContent = msg;
                document.getElementById('alertError').classList.add('show');
            } else {
                document.getElementById('alertSuccess').classList.add('show');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            var token = localStorage.getItem('token');
            if (token) {
                fetch(API + '/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(function(r) { return r.json(); })
                .then(function(d) { if (d.success || d.user) window.location.href = '/dashboard.html'; })
                .catch(function() { localStorage.removeItem('token'); });
            }
            var saved = localStorage.getItem('rememberedEmail');
            if (saved) { document.getElementById('email').value = saved; document.getElementById('lembrar').checked = true; }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('btnLogin');
            var email = document.getElementById('email').value.trim();
            var senha = document.getElementById('senha').value;
            var lembrar = document.getElementById('lembrar').checked;

            if (!email || !senha) { showAlert('error', 'Preencha todos os campos'); return; }

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                var r = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, senha: senha })
                });
                var d = await r.json();

                if (d.success && d.token) {
                    localStorage.setItem('token', d.token);
                    if (d.user) localStorage.setItem('user', JSON.stringify(d.user));
                    if (lembrar) localStorage.setItem('rememberedEmail', email);
                    else localStorage.removeItem('rememberedEmail');
                    showAlert('success');
                    setTimeout(function() { window.location.href = '/dashboard.html'; }, 600);
                } else {
                    showAlert('error', d.error || d.message || 'Credenciais inválidas');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch (err) {
                showAlert('error', 'Erro ao conectar com o servidor');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
