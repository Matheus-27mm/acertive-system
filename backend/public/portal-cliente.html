<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Portal do Cliente — ACERTIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* v2 — portal-cliente.html */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060608;
  --s1:#0d0d10;--s2:#13131a;--s3:#1a1a24;
  --gold:#c9a84c;--gd:#7a5e20;--gxl:#e8c96a;
  --red:#e84040;
  --green:#2ecc71;--green-s:rgba(46,204,113,.1);--green-br:rgba(46,204,113,.2);
  --white:#f5f0ea;--text:#9a968e;--t2:#5a5650;--t3:#2e2c28;
  --br:rgba(255,255,255,.06);--brh:rgba(255,255,255,.10);
  --br-gold:rgba(201,168,76,.12);--brh-gold:rgba(201,168,76,.22);
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow-x:hidden;
  background-image:
    linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);
  background-size:40px 40px;
}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:3px}

/* orbs */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb.a{width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.045) 0%,transparent 70%);top:-100px;left:-100px}
.orb.b{width:400px;height:400px;background:radial-gradient(circle,rgba(201,168,76,.03) 0%,transparent 70%);bottom:-80px;right:-80px}

/* wrap */
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}

/* logo */
.logo-area{text-align:center;margin-bottom:28px}
.logo-img{height:38px;object-fit:contain;filter:drop-shadow(0 2px 16px rgba(201,168,76,.4));mix-blend-mode:screen;display:block;margin:0 auto 12px}
.logo-nome{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);letter-spacing:2.5px}
.logo-nome span{color:var(--gold)}
.logo-sub{font-size:9px;color:var(--t2);letter-spacing:3px;text-transform:uppercase;margin-top:5px}

/* card */
.card{
  background:var(--s1);
  border:1px solid var(--brh-gold);
  border-radius:16px;
  padding:28px 28px 24px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--gold) 30%,var(--gxl) 50%,var(--gold) 70%,transparent 95%);
  opacity:.6;
}

/* tabs */
.tabs{
  display:flex;gap:3px;
  background:var(--s2);border-radius:9px;padding:3px;
  margin-bottom:22px;
}
.tab-btn{
  flex:1;padding:8px;border-radius:6px;
  font-size:12px;font-weight:600;color:var(--t2);
  transition:all .18s;text-align:center;cursor:pointer;
}
.tab-btn.active{background:var(--s3);color:var(--white);border:1px solid var(--br-gold)}

.pane{display:none;flex-direction:column;gap:13px}
.pane.active{display:flex}

/* campos */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.7px}
.iw{position:relative}
.iw i.ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t2);pointer-events:none}
.iw input{
  width:100%;padding:10px 11px 10px 32px;
  background:var(--s3);border:1px solid var(--br);border-radius:8px;
  color:var(--white);font-size:13px;outline:none;
  transition:border-color .15s;
  font-family:'DM Sans',sans-serif;
}
.iw input[type=date]{padding-left:32px}
.iw input.mono{font-family:'DM Mono',monospace}
.iw input:focus{border-color:var(--brh)}
.iw .eye{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--t2);cursor:pointer;
  padding:5px 6px;border-radius:5px;
  transition:color .15s;z-index:2;
  display:flex;align-items:center;justify-content:center;
}
.iw .eye:hover{color:var(--white);background:rgba(255,255,255,.05)}

/* barra de força */
.pw-bar-wrap{height:3px;border-radius:3px;background:var(--s3);margin-top:3px}
.pw-bar{height:100%;border-radius:3px;width:0;transition:all .3s}

/* alerta */
.alerta{
  display:none;align-items:center;gap:7px;
  padding:9px 12px;border-radius:8px;font-size:12px;
}
.alerta.on{display:flex}
.alerta.err{background:rgba(232,64,64,.07);border:1px solid rgba(232,64,64,.2);color:var(--red)}
.alerta.ok{background:var(--green-s);border:1px solid var(--green-br);color:var(--green)}
.alerta i{font-size:10px;flex-shrink:0}

/* btns */
.btn-g{
  width:100%;padding:12px;margin-top:2px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gd) 100%);
  border-radius:9px;font-size:13px;font-weight:700;color:#000;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-g:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-g:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}

.divider{display:flex;align-items:center;gap:10px;color:var(--t3);font-size:10px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--br)}

.link-txt{text-align:center;font-size:11px;color:var(--t2)}
.link-txt span{color:var(--gold);cursor:pointer;font-weight:600}
.link-txt span:hover{text-decoration:underline}

.hint-txt{font-size:10px;color:var(--t3);text-align:center;line-height:1.6}

/* footer */
.footer{text-align:center;font-size:10px;color:var(--t2);margin-top:18px;line-height:1.7}
.footer a{color:var(--gold)}

/* spin */
.spin{width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:sp .65s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:460px){.wrap{padding:14px}.card{padding:22px 18px 20px}}
</style>
</head>
<body>
<div class="orb a"></div>
<div class="orb b"></div>

<div class="wrap">
  <div class="logo-area">
    <img src="/acertivelogo.png" alt="ACERTIVE" class="logo-img">
    <div class="logo-nome">ACERT<span>IVE</span></div>
    <div class="logo-sub">Portal do Cliente</div>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Entrar</div>
      <div class="tab-btn" id="tabCad" onclick="switchTab('cadastro')">Criar conta</div>
    </div>

    <!-- LOGIN -->
    <div class="pane active" id="paneLogin">
      <div class="fg">
        <label>CPF</label>
        <div class="iw">
          <i class="fas fa-id-card ico"></i>
          <input type="text" id="lCpf" class="mono" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCpf(this)" autocomplete="username">
        </div>
      </div>
      <div class="fg">
        <label>Senha</label>
        <div class="iw">
          <i class="fas fa-lock ico"></i>
          <input type="password" id="lSenha" placeholder="Sua senha" autocomplete="current-password">
          <span class="eye" onclick="togglePw('lSenha',this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div class="alerta err" id="lErr"><i class="fas fa-triangle-exclamation"></i><span id="lErrTxt">CPF ou senha incorretos.</span></div>
      <button class="btn-g" id="btnLogin" onclick="fazerLogin()">
        <i class="fas fa-sign-in-alt"></i> Entrar no portal
      </button>
      <div class="divider"><span>ou</span></div>
      <div class="link-txt">Não tem conta? <span onclick="switchTab('cadastro')">Crie agora</span></div>
    </div>

    <!-- CADASTRO -->
    <div class="pane" id="paneCad">
      <div class="fg">
        <label>CPF</label>
        <div class="iw">
          <i class="fas fa-id-card ico"></i>
          <input type="text" id="cCpf" class="mono" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCpf(this)">
        </div>
      </div>
      <div class="fg">
        <label>Data de nascimento</label>
        <div class="iw">
          <i class="fas fa-calendar ico"></i>
          <input type="date" id="cNasc">
        </div>
      </div>
      <div class="fg">
        <label>Senha</label>
        <div class="iw">
          <i class="fas fa-lock ico"></i>
          <input type="password" id="cSenha" placeholder="Mín. 6 caracteres" oninput="forca(this)" autocomplete="new-password">
          <span class="eye" onclick="togglePw('cSenha',this)"><i class="fas fa-eye"></i></span>
        </div>
        <div class="pw-bar-wrap"><div class="pw-bar" id="pwBar"></div></div>
      </div>
      <div class="fg">
        <label>Confirmar senha</label>
        <div class="iw">
          <i class="fas fa-lock ico"></i>
          <input type="password" id="cSenha2" placeholder="Repita a senha" autocomplete="new-password">
          <span class="eye" onclick="togglePw('cSenha2',this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div class="alerta err" id="cErr"><i class="fas fa-triangle-exclamation"></i><span id="cErrTxt"></span></div>
      <div class="alerta ok" id="cOk"><i class="fas fa-check-circle"></i><span>Conta criada! Entrando...</span></div>
      <button class="btn-g" id="btnCad" onclick="fazerCadastro()">
        <i class="fas fa-user-plus"></i> Criar minha conta
      </button>
      <div class="hint-txt">Seu CPF e data de nascimento devem corresponder ao cadastro do sistema.</div>
    </div>
  </div>

  <div class="footer">
    Dificuldades? Fale pelo <a href="https://wa.me/5592981040145" target="_blank">WhatsApp</a><br>
    <span style="color:var(--t3)">ACERTIVE Assessoria e Cobrança</span>
  </div>
</div>

<script>
const API = window.location.origin;

if(localStorage.getItem('cliente_token')) window.location.href='/portal-cliente-dashboard.html';

function switchTab(t){
  ['Login','Cad'].forEach(x=>{
    document.getElementById('tab'+x).classList.toggle('active', (t==='login'&&x==='Login')||(t==='cadastro'&&x==='Cad'));
    document.getElementById('pane'+x).classList.toggle('active', (t==='login'&&x==='Login')||(t==='cadastro'&&x==='Cad'));
  });
}

function mascaraCpf(el){
  let v=el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>9) v=v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/,'$1.$2.$3-$4');
  else if(v.length>6) v=v.replace(/(\d{3})(\d{3})(\d+)/,'$1.$2.$3');
  else if(v.length>3) v=v.replace(/(\d{3})(\d+)/,'$1.$2');
  el.value=v;
}

function togglePw(id,el){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  el.querySelector('i').className=show?'fas fa-eye-slash':'fas fa-eye';
}

function forca(el){
  const v=el.value;
  let s=0;
  if(v.length>=6)s++;if(v.length>=10)s++;
  if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const bar=document.getElementById('pwBar');
  bar.style.width=[0,20,40,60,80,100][s]+'%';
  bar.style.background=['','#e84040','#d97c2e','#c9a84c','#5b8fe8','#2ecc71'][s];
}

function setBtn(id,load,txt){
  const b=document.getElementById(id);
  b.disabled=load;
  b.innerHTML=load?'<div class="spin"></div>':txt;
}
function showErr(id,msg){
  const el=document.getElementById(id);
  el.querySelector('span').textContent=msg;
  el.className='alerta err on';
}
function hideErr(id){document.getElementById(id).className='alerta err'}

async function fazerLogin(){
  const cpf=document.getElementById('lCpf').value.replace(/\D/g,'');
  const senha=document.getElementById('lSenha').value;
  if(cpf.length!==11){showErr('lErr','CPF inválido.');return;}
  if(!senha){showErr('lErr','Digite sua senha.');return;}
  hideErr('lErr');
  setBtn('btnLogin',true,'');
  try{
    const r=await fetch(API+'/api/portal-cliente/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cpf,senha})
    });
    const d=await r.json();
    if(d.success){
      localStorage.setItem('cliente_token',d.token);
      localStorage.setItem('cliente_nome',d.cliente.nome);
      window.location.href='/portal-cliente-dashboard.html';
    } else {
      showErr('lErr',d.error||'CPF ou senha incorretos.');
      setBtn('btnLogin',false,'<i class="fas fa-sign-in-alt"></i> Entrar no portal');
    }
  }catch(e){
    showErr('lErr','Erro de conexão. Tente novamente.');
    setBtn('btnLogin',false,'<i class="fas fa-sign-in-alt"></i> Entrar no portal');
  }
}

async function fazerCadastro(){
  const cpf=document.getElementById('cCpf').value.replace(/\D/g,'');
  const nasc=document.getElementById('cNasc').value;
  const senha=document.getElementById('cSenha').value;
  const senha2=document.getElementById('cSenha2').value;
  hideErr('cErr');
  document.getElementById('cOk').className='alerta ok';
  if(cpf.length!==11){showErr('cErr','CPF inválido.');return;}
  if(!nasc){showErr('cErr','Informe sua data de nascimento.');return;}
  if(senha.length<6){showErr('cErr','Senha deve ter ao menos 6 caracteres.');return;}
  if(senha!==senha2){showErr('cErr','As senhas não coincidem.');return;}
  setBtn('btnCad',true,'');
  try{
    const r=await fetch(API+'/api/portal-cliente/cadastro',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cpf,data_nascimento:nasc,senha})
    });
    const d=await r.json();
    if(d.success){
      document.getElementById('cOk').className='alerta ok on';
      setTimeout(()=>{
        localStorage.setItem('cliente_token',d.token);
        localStorage.setItem('cliente_nome',d.cliente.nome);
        window.location.href='/portal-cliente-dashboard.html';
      },1200);
    } else {
      showErr('cErr',d.error||'Não foi possível criar a conta.');
      setBtn('btnCad',false,'<i class="fas fa-user-plus"></i> Criar minha conta');
    }
  }catch(e){
    showErr('cErr','Erro de conexão. Tente novamente.');
    setBtn('btnCad',false,'<i class="fas fa-user-plus"></i> Criar minha conta');
  }
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('paneLogin').classList.contains('active'))fazerLogin();
  else fazerCadastro();
});
</script>
</body>
</html>
